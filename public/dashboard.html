<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0908">
  <title>Down Dog Lodge — Going Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0908;
      --surface: #13110e;
      --surface-raised: #1a1814;
      --surface-hover: #211e19;
      --border: #23201a;
      --border-light: #302b23;
      --text: #ede8df;
      --text-secondary: #9e968a;
      --text-muted: #5e584e;
      --accent: #c8963c;
      --accent-glow: rgba(200, 150, 60, 0.35);
      --timer-color: #68b47a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle ambient warm glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 25% 55%, rgba(200, 150, 60, 0.025) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─── */
    .header {
      position: relative;
      padding: 1.1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 2rem;
      right: 2rem;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--border) 15%,
        var(--border-light) 40%,
        rgba(200, 150, 60, 0.25) 50%,
        var(--border-light) 60%,
        var(--border) 85%,
        transparent
      );
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand-logo {
      height: 3.2rem;
      width: auto;
      filter: invert(1);
      opacity: 0.92;
    }

    .brand-divider {
      width: 1px;
      height: 1.5rem;
      background: var(--border-light);
    }

    .brand .subtitle {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      padding-top: 0.1rem;
    }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .location-nav {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 3px;
    }

    .loc-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.55rem 1.25rem;
      cursor: pointer;
      border-radius: calc(var(--radius-md) - 2px);
      transition: color 0.2s, background 0.2s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .loc-btn:hover {
      color: var(--text);
      background: var(--surface-raised);
    }

    .loc-btn.active {
      background: var(--accent);
      color: var(--bg);
    }

    /* ─── Filter ─── */
    .filter-wrap {
      position: relative;
    }

    .filter-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: all 0.2s;
    }

    .filter-toggle:hover {
      border-color: var(--border-light);
      color: var(--text);
    }

    .filter-toggle.active {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-badge {
      background: var(--accent);
      color: var(--bg);
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      line-height: 1.3;
    }

    .filter-chevron {
      width: 13px;
      height: 13px;
      transition: transform 0.2s;
      opacity: 0.6;
    }

    .filter-toggle.active .filter-chevron {
      transform: rotate(180deg);
    }

    .filter-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface-raised);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 5px;
      min-width: 200px;
      display: none;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    .filter-panel.open {
      display: block;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.65rem;
      border-radius: calc(var(--radius-md) - 4px);
      cursor: pointer;
      transition: background 0.12s;
    }

    .filter-option:hover {
      background: var(--surface-hover);
    }

    .filter-option input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-light);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
      background: transparent;
    }

    .filter-option input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .filter-option input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4.5px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid var(--bg);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .filter-option label {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      flex: 1;
      transition: color 0.12s;
    }

    .filter-option:hover label {
      color: var(--text);
    }

    /* ─── Main Container ─── */
    #dog-container {
      flex: 1;
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem 2rem 2rem;
      overflow: hidden;
      position: relative;
      z-index: 1;
      justify-content: center;
      align-items: stretch;
    }

    /* ─── Dog Cards ─── */
    .dog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      overflow: hidden;
      min-width: 0;
    }

    .dog-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .dog-photo {
      position: relative;
      overflow: hidden;
      border-radius: calc(var(--radius-xl) - 4px);
      flex: 1;
      min-height: 0;
      background: var(--surface-raised);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dog-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      aspect-ratio: 1 / 1;
      display: block;
    }

    .dog-info {
      padding: 0.6rem 0.5rem 0.3rem;
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: 0.2rem 0.6rem;
    }

    .going-home-label {
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--accent);
    }

    .dog-name {
      font-family: var(--font-display);
      font-weight: 400;
      color: var(--text);
      line-height: 1;
      text-transform: uppercase;
    }

    .timer {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--timer-color);
    }

    .meta-dot {
      color: var(--text-muted);
      font-size: 1rem;
    }

    .service-type {
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--accent);
      text-transform: capitalize;
    }

    /* Featured card */
    .dog-card.featured {
      flex: 0 0 40%;
    }

    .dog-card.featured .dog-name {
      font-size: 3.25rem;
    }

    .dog-card.featured .timer {
      font-size: 2rem;
    }

    .dog-card.featured .meta-dot {
      font-size: 1.5rem;
    }

    .dog-card.featured .service-type {
      font-size: 1.75rem;
    }

    .dog-card.featured .going-home-label {
      font-size: 1rem;
    }

    /* Solo card */
    .dog-card.solo {
      flex: 0 1 550px;
      max-height: 100%;
    }

    /* ─── Dogs Grid ─── */
    .dogs-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
      min-width: 0;
      align-content: stretch;
    }

    .dogs-grid .dog-photo img {
      aspect-ratio: 1 / 1;
    }

    .dogs-grid .dog-name {
      font-size: 2rem;
    }

    .dogs-grid .timer {
      font-size: 1.4rem;
    }

    .dogs-grid .service-type {
      font-size: 1.25rem;
    }

    .dogs-grid .going-home-label {
      display: none;
    }

    /* ─── Highlight (recent checkout glow) ─── */
    .dog-card.highlight {
      border-color: var(--accent);
      animation: glow-pulse 2.5s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 var(--accent-glow);
      }
      50% {
        box-shadow: 0 0 24px 2px rgba(200, 150, 60, 0.12);
      }
    }

    /* ─── Card entrance ─── */
    .animate-in {
      animation: card-enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: calc(var(--i, 0) * 0.07s);
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ─── Empty & Loading ─── */
    .empty-state,
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 0.4rem;
      padding: 3rem;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 2.25rem;
      color: var(--text-secondary);
    }

    .empty-sub {
      font-size: 1.25rem;
      color: var(--text-muted);
    }

    .loading-state {
      font-size: 1.25rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      #dog-container {
        flex-direction: column;
        overflow-y: auto;
        align-items: stretch;
      }

      .dog-card.featured,
      .dog-card.solo {
        flex: none;
        max-width: none;
        max-height: 50vh;
      }

      .dogs-grid {
        flex: none;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 0.65rem;
        padding: 0.9rem 1rem;
      }

      .header::after {
        left: 1rem;
        right: 1rem;
      }

      .brand h1 {
        font-size: 1.5rem;
      }

      .brand .subtitle {
        font-size: 0.75rem;
      }

      .controls {
        width: 100%;
        justify-content: space-between;
      }

      .loc-btn {
        padding: 0.4rem 0.75rem;
        font-size: 0.8rem;
      }

      .filter-toggle {
        font-size: 0.8rem;
      }

      #dog-container {
        padding: 1rem;
        gap: 0.75rem;
      }

      .dog-card.featured,
      .dog-card.solo {
        max-height: none;
      }

      .dog-card.featured .dog-name {
        font-size: 2rem;
      }

      .dog-card.featured .timer {
        font-size: 1.25rem;
      }

      .dog-card.featured .service-type {
        font-size: 1.1rem;
      }

      .dogs-grid {
        gap: 0.75rem;
      }

      .dogs-grid .dog-name {
        font-size: 1.4rem;
      }

      .dogs-grid .timer {
        font-size: 1rem;
      }

      .dogs-grid .service-type {
        font-size: 0.9rem;
      }

      .dog-card {
        border-radius: var(--radius-lg);
      }

      .dog-photo {
        border-radius: calc(var(--radius-lg) - 4px);
      }
    }

    @media (max-width: 480px) {
      .dogs-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="brand-logo" src="https://moegonew.s3-us-west-2.amazonaws.com/Public/Uploads/1773773054ea0084a5d186418a95d10c98a1451933.webp" alt="Down Dog Lodge">
      <span class="brand-divider"></span>
      <span class="subtitle">Going Home</span>
    </div>
  </header>

  <main id="dog-container">
    <div class="loading-state">Loading checkout data...</div>
  </main>

  <audio id="ding-sound" preload="auto">
    <source src="ding.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Configuration
    const API_BASE_URL = window.location.origin;

    let currentLocation = null;
    let lastReservationId = null;
    let allDogs = [];
    let lastRenderedIds = '';

    // ─── (Filter removed) ───

    // ─── Data Loading ───
    async function loadDogs() {
      try {
        const res = await fetch(API_BASE_URL + '/dogs?location=' + currentLocation + '&_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const dogs = await res.json();
        dogs.forEach(dog => {
          if (!dog.serviceItemType || dog.serviceItemType === '') {
            dog.serviceItemType = 'EVALUATION';
          }
        });

        allDogs = dogs;

        if (allDogs.length === 0) {
          document.getElementById('dog-container').innerHTML =
            '<div class="empty-state"><p class="empty-title">All paws accounted for</p><p class="empty-sub">No recent checkouts at this location</p></div>';
          lastRenderedIds = '';
          return;
        }

        const latestId = allDogs[0].appointmentId;
        if (latestId !== lastReservationId && lastReservationId !== null) {
          document.getElementById('ding-sound').play().catch(() => {});
          lastRenderedIds = '';
        }

        lastReservationId = latestId;
        renderDogs();
      } catch (err) {
        console.error('Failed to load dogs:', err);
        document.getElementById('dog-container').innerHTML =
          '<div class="empty-state"><p class="empty-title">Unable to connect</p><p class="empty-sub">' + err.message + '</p></div>';
      }
    }

    // ─── Card Creation ───
    function createDogCard(dog, isFeatured, index) {
      const card = document.createElement('article');
      card.className = 'dog-card';
      if (isFeatured) card.classList.add('featured');

      const checkoutTime = new Date(dog.checkOutTime);
      if ((Date.now() - checkoutTime.getTime()) / 1000 <= 60) {
        card.classList.add('highlight');
      }

      const photoWrap = document.createElement('div');
      photoWrap.className = 'dog-photo';

      const img = document.createElement('img');
      img.src = dog.imageUrl || 'placeholder.jpg';
      img.alt = dog.name;
      img.decoding = 'async';
      img.onerror = () => { img.src = 'placeholder.jpg'; };
      photoWrap.appendChild(img);

      const info = document.createElement('div');
      info.className = 'dog-info';

      if (isFeatured) {
        const label = document.createElement('span');
        label.className = 'going-home-label';
        label.textContent = 'Going Home';
        info.appendChild(label);
      }

      const name = document.createElement('span');
      name.className = 'dog-name';
      name.textContent = dog.name;

      const dot1 = document.createElement('span');
      dot1.className = 'meta-dot';
      dot1.textContent = '\u00b7';

      const timer = document.createElement('span');
      timer.className = 'timer';
      timer.setAttribute('data-checkout', dog.checkOutTime);

      const dot2 = document.createElement('span');
      dot2.className = 'meta-dot';
      dot2.textContent = '\u00b7';

      const type = document.createElement('span');
      type.className = 'service-type';
      type.textContent = dog.serviceItemType.toLowerCase().replace(/_/g, ' ');

      info.appendChild(name);
      info.appendChild(dot1);
      info.appendChild(timer);
      info.appendChild(dot2);
      info.appendChild(type);

      card.appendChild(photoWrap);
      card.appendChild(info);

      return card;
    }

    // ─── Rendering ───
    function renderDogs() {
      const container = document.getElementById('dog-container');
      const filteredDogs = allDogs;

      const currentIds = filteredDogs.map(d => d.appointmentId).join(',');
      const shouldAnimate = currentIds !== lastRenderedIds;

      if (!shouldAnimate) {
        updateTimers();
        return;
      }

      lastRenderedIds = currentIds;
      container.innerHTML = '';

      if (filteredDogs.length === 0) {
        container.innerHTML =
          '<div class="empty-state"><p class="empty-title">No dogs going home yet</p><p class="empty-sub">Check back soon</p></div>';
        return;
      }

      // Featured card (most recent dog)
      const featured = createDogCard(filteredDogs[0], true, 0);
      featured.style.setProperty('--i', 0);
      featured.classList.add('animate-in');

      if (filteredDogs.length === 1) {
        featured.classList.add('solo');
      }

      container.appendChild(featured);

      // Grid for remaining dogs
      if (filteredDogs.length > 1) {
        const grid = document.createElement('div');
        grid.className = 'dogs-grid';

        filteredDogs.slice(1).forEach((dog, i) => {
          const card = createDogCard(dog, false, i + 1);
          card.style.setProperty('--i', i + 1);
          card.classList.add('animate-in');
          grid.appendChild(card);
        });

        container.appendChild(grid);
      }

      updateTimers();
    }

    // ─── Timer Updates ───
    function updateTimers() {
      const now = Date.now();
      document.querySelectorAll('.timer').forEach(timer => {
        const checkout = new Date(timer.getAttribute('data-checkout')).getTime();
        const diffMs = now - checkout;
        const diffMin = Math.floor(diffMs / 60000);

        if (diffMin <= 0) {
          timer.textContent = 'Just now';
        } else if (diffMin === 1) {
          timer.textContent = '1 min ago';
        } else {
          timer.textContent = diffMin + ' min ago';
        }

        // Update highlight state dynamically
        const card = timer.closest('.dog-card');
        if (card) {
          if (diffMs / 1000 <= 60) {
            card.classList.add('highlight');
          } else {
            card.classList.remove('highlight');
          }
        }
      });
    }

    // ─── Init ───
    async function initDashboard() {
      try {
        const res = await fetch(API_BASE_URL + '/locations');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const businessName = data.businessName || 'Pet Facility';
        const locations = data.locations || {};
        const slugs = Object.keys(locations);
        if (slugs.length === 0) throw new Error('No locations configured');

        currentLocation = slugs[0];
        document.title = businessName + ' \u2014 Going Home';

        loadDogs();
        setInterval(updateTimers, 5000);
        setInterval(loadDogs, 5000);
      } catch (err) {
        document.getElementById('dog-container').innerHTML =
          '<div class="empty-state"><p class="empty-title">Configuration error</p>' +
          '<p class="empty-sub">' + err.message + '</p></div>';
      }
    }

    initDashboard();

    // Enable audio on first interaction
    document.addEventListener('click', () => {
      document.getElementById('ding-sound').load();
    }, { once: true });
  </script>
</body>
</html>
