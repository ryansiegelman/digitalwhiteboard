<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0908">
  <title>Down Dog Lodge &mdash; Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0908;
      --surface: #13110e;
      --surface-raised: #1a1814;
      --border: #23201a;
      --border-light: #302b23;
      --text: #ede8df;
      --text-secondary: #9e968a;
      --text-muted: #5e584e;
      --accent: #ede8df;
      --accent-glow: rgba(237,232,223,0.35);
      --checkin-color: #ede8df;
      --checkin-glow: rgba(237,232,223,0.35);
      --ddl-blue: #1e3a6b;
      --timer-color: #4a6fa5;
      --radius-lg: 20px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text); font-family:var(--font-body);
      height:100vh; overflow:hidden; display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }
    body::after {
      content:''; position:fixed; inset:0;
      background:radial-gradient(ellipse at 25% 55%,rgba(237,232,223,0.02) 0%,transparent 55%);
      pointer-events:none; z-index:0;
    }
    .header {
      position:relative; padding:1.1rem 2rem; display:flex;
      justify-content:space-between; align-items:center; flex-shrink:0; z-index:10;
    }
    .header::after {
      content:''; position:absolute; bottom:0; left:2rem; right:2rem; height:1px;
      background:linear-gradient(90deg,transparent,var(--border) 15%,var(--border-light) 40%,rgba(237,232,223,0.25) 50%,var(--border-light) 60%,var(--border) 85%,transparent);
    }
    .brand { display:flex; align-items:center; gap:0.9rem; }
    .brand-logo { height:3.2rem; width:auto; }
    .brand-divider { width:1px; height:1.5rem; background:var(--border-light); }
    .brand .subtitle { font-size:1rem; font-weight:600; text-transform:uppercase; letter-spacing:0.18em; color:var(--accent); padding-top:0.1rem; }
    .datetime { display:flex; flex-direction:column; align-items:flex-end; gap:0.15rem; line-height:1; font-variant-numeric:tabular-nums; }
    .datetime .dt-time { font-family:var(--font-display); font-size:1.9rem; color:var(--text); }
    .datetime .dt-date { font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.18em; color:var(--text-secondary); }
    #main-container {
      flex:1; display:flex; flex-direction:row; gap:1rem;
      padding:1rem 1.5rem 1.5rem; overflow:hidden; position:relative; z-index:1; min-height:0;
    }
    .panel {
      display:flex; flex-direction:column;
      flex-grow:var(--weight,1); flex-basis:0; min-width:0; overflow:hidden;
      transition:flex-grow 0.6s cubic-bezier(0.22,1,0.36,1);
      border:2px solid var(--text); border-radius:var(--radius-lg);
      padding:0.9rem 1rem; background:rgba(255,255,255,0.01);
    }
    .panel-header {
      text-align:center; font-size:2.2rem; font-weight:700;
      text-transform:uppercase; letter-spacing:0.18em; padding:0.2rem 0 0.8rem; flex-shrink:0;
    }
    .panel-checkin .panel-header { color:var(--checkin-color); }
    .panel-checkout .panel-header { color:var(--accent); }
    .panel-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
    .dog-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:0.25rem; display:flex; flex-direction:column;
      transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s ease;
      overflow:hidden; min-width:0; min-height:0;
    }
    .dog-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(0,0,0,0.25); }
    .dog-photo {
      position:relative; overflow:hidden; border-radius:calc(var(--radius-lg) - 4px);
      flex:1; min-height:0; background:var(--surface-raised);
      display:flex; align-items:center; justify-content:center;
    }
    .dog-photo img {
      width:100%; height:100%; object-fit:contain; object-position:center; display:block; background:var(--surface-raised);
    }
    .dog-info {
      padding:0.3rem 0.5rem 0.15rem; flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; gap:0;
    }
    .feature-label {
      display:block; width:100%; text-align:center;
      font-size:0.7rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.1rem;
    }
    .panel-checkin .feature-label { color:var(--checkin-color); }
    .panel-checkout .feature-label { color:var(--accent); }
    .dog-name {
      font-family:var(--font-display); font-weight:400; color:var(--text);
      line-height:1; text-transform:uppercase; font-size:2rem; text-align:center;
    }
    .timer {
      font-size:0.75rem; font-weight:500; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--timer-color); margin-top:0.15rem;
    }
    .dog-service-row { display:flex; justify-content:center; width:100%; margin-top:0.2rem; }
    .service-type {
      display:inline-block; padding:0.2rem 0.75rem; border-radius:999px;
      border:1px solid var(--ddl-blue); background:var(--ddl-blue);
      font-size:0.95rem; font-weight:700; letter-spacing:0.08em; color:var(--text); white-space:nowrap;
    }
    .dogs-grid {
      flex:1; display:grid;
      grid-template-columns:repeat(var(--cols,1),1fr);
      grid-auto-rows:1fr; gap:0.75rem; min-height:0; align-content:stretch;
    }
    .panel-checkout .dog-card.highlight { border-color:var(--accent); animation:glow-co 2.5s ease-in-out infinite; }
    .panel-checkin  .dog-card.highlight { border-color:var(--checkin-color); animation:glow-ci 2.5s ease-in-out infinite; }
    @keyframes glow-co { 0%,100%{box-shadow:0 0 0 0 var(--accent-glow)} 50%{box-shadow:0 0 24px 2px rgba(237,232,223,0.14)} }
    @keyframes glow-ci { 0%,100%{box-shadow:0 0 0 0 var(--checkin-glow)} 50%{box-shadow:0 0 24px 2px rgba(237,232,223,0.14)} }
    .animate-in { animation:card-enter 0.5s cubic-bezier(0.22,1,0.36,1) both; animation-delay:calc(var(--i,0)*0.07s); }
    @keyframes card-enter { from{opacity:0;transform:translateY(20px) scale(0.96)} to{opacity:1;transform:none} }
    .empty-state,.loading-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      flex:1; width:100%; height:100%; text-align:center;
    }
    .empty-check { display:block; font-size:3rem; line-height:1; color:#ffffff; font-weight:300; }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="brand-logo" src="https://moegonew.s3-us-west-2.amazonaws.com/Public/Uploads/1773773054ea0084a5d186418a95d10c98a1451933.webp" alt="Down Dog Lodge">
      <span class="brand-divider"></span>
      <span class="subtitle">Live</span>
    </div>
    <div class="datetime" id="datetime">
      <span class="dt-time" id="dt-time">--:--</span>
      <span class="dt-date" id="dt-date"></span>
    </div>
  </header>
  <main id="main-container">
    <section class="panel panel-checkin" id="panel-checkin">
      <h2 class="panel-header">Checking In</h2>
      <div class="panel-content" id="checkin-content">
        <div class="loading-state"><span class="empty-check">&#10003;</span></div>
      </div>
    </section>
    <section class="panel panel-checkout" id="panel-checkout">
      <h2 class="panel-header">Checking Out</h2>
      <div class="panel-content" id="checkout-content">
        <div class="loading-state"><span class="empty-check">&#10003;</span></div>
      </div>
    </section>
  </main>
  <audio id="ding-sound" preload="auto"><source src="ding.mp3" type="audio/mpeg"></audio>
  <script>
    const API_BASE_URL = window.location.origin;
    const HIGHLIGHT_WINDOW_S = 60;
    const POLL_INTERVAL_MS = 5000;
    const TIMER_INTERVAL_MS = 5000;
    const EXPIRY_MS = 10 * 60 * 1000;
    const DEMO_MODE = new URLSearchParams(window.location.search).has('demo');
    let currentLocation = null;
    let lastCheckoutId = null;
    let lastCheckinId = null;
    const renderState = { checkins: '', checkouts: '' };

    function formatServiceType(serviceItemType, serviceName) {
      const raw = (serviceName || serviceItemType || '').trim();
      const sl = raw.toLowerCase().replace(/_/g,' ');
      if (sl === 'daycare' || sl === 'day care') return 'Daycare';
      if (sl === 'boarding' || sl === 'overnight' || sl === 'overnight boarding') return 'Boarding';
      if (sl === 'tt: phase 1' || sl === 'tt phase 1' || sl === 'training phase 1' || sl === 'training: phase 1') return 'TT: Phase 1';
      if (sl === 'tt: phase 2' || sl === 'tt phase 2' || sl === 'training phase 2' || sl === 'training: phase 2') return 'TT: Phase 2';
      if (raw) return raw.replace(/w/g, function(c){ return c.toUpperCase(); });
      return 'Reservation';
    }

    async function fetchList(endpoint) {
      if (DEMO_MODE) return demoList(endpoint);
      try {
        const res = await fetch(API_BASE_URL + '/' + endpoint + '?location=' + currentLocation + '&_=' + Date.now());
        if (!res.ok) return [];
        const raw = await res.json();
        let arr = Array.isArray(raw) ? raw
          : Array.isArray(raw.data) ? raw.data
          : Array.isArray(raw.checkins) ? raw.checkins
          : Array.isArray(raw.checkouts) ? raw.checkouts
          : Array.isArray(raw.dogs) ? raw.dogs : [];
        arr = arr.map(function(d) {
          const n = Object.assign({}, d);
          if (n.check_in_time   && !n.checkInTime)      n.checkInTime     = n.check_in_time;
          if (n.check_out_time  && !n.checkOutTime)     n.checkOutTime    = n.check_out_time;
          if (n.appointment_id  && !n.appointmentId)    n.appointmentId   = n.appointment_id;
          if (n.image_url       && !n.imageUrl)         n.imageUrl        = n.image_url;
          if (n.service_name    && !n.serviceName)      n.serviceName     = n.service_name;
          if (n.service_item_type && !n.serviceItemType) n.serviceItemType = n.service_item_type;
          return n;
        });
        window._lastApiResponse = window._lastApiResponse || {};
        window._lastApiResponse[endpoint] = { raw, normalized: arr, ts: new Date().toISOString() };
        return arr;
      } catch(err) {
        console.error('fetchList ' + endpoint, err);
        return [];
      }
    }

    function filterRecent(dogs, timeField) {
      return dogs.filter(function(d){ return d[timeField]; });
    }

    function pruneExpiredCards() {
      const now = Date.now();
      let removed = false;
      document.querySelectorAll('#checkout-content .dog-card').forEach(function(card) {
        const timerEl = card.querySelector('.timer');
        if (!timerEl) return;
        const ts = timerEl.dataset.time;
        if (!ts) return;
        if (now - new Date(ts).getTime() >= EXPIRY_MS) { card.remove(); removed = true; }
      });
      if (removed) {
        renderState.checkouts = '';
        const content = document.getElementById('checkout-content');
        const grid = content && content.querySelector('.dogs-grid');
        if (grid && grid.children.length === 0) {
          content.innerHTML = '<div class="empty-state"><span class="empty-check">&#10003;</span></div>';
        } else if (!grid) {
          content.innerHTML = '<div class="empty-state"><span class="empty-check">&#10003;</span></div>';
        }
      }
    }

    function updateTimers() {
      const now = Date.now();
      document.querySelectorAll('.timer[data-time]').forEach(function(timer) {
        const ts = timer.getAttribute('data-time');
        if (!ts) return;
        const diffMs = now - new Date(ts).getTime();
        const diffMin = Math.floor(diffMs / 60000);
        if (diffMin <= 0)       timer.textContent = 'Just now';
        else if (diffMin === 1) timer.textContent = '1 min. ago';
        else if (diffMin < 60)  timer.textContent = diffMin + ' min. ago';
        else {
          const h = Math.floor(diffMin / 60), m = diffMin % 60;
          timer.textContent = h + 'h ' + (m > 0 ? m + 'm ' : '') + 'ago';
        }
      });
      pruneExpiredCards();
    }

    function createDogCard(dog, timeField, featureLabelText) {
      const card = document.createElement('article');
      card.className = 'dog-card';
      const t = new Date(dog[timeField]);
      if ((Date.now() - t.getTime()) / 1000 <= HIGHLIGHT_WINDOW_S) card.classList.add('highlight');

      const photoWrap = document.createElement('div');
      photoWrap.className = 'dog-photo';
      const img = document.createElement('img');
      img.src = dog.imageUrl || 'placeholder.svg';
      img.alt = dog.name || '';
      img.decoding = 'async';
      img.onerror = function(){ img.onerror = null; img.src = 'placeholder.svg'; };
      photoWrap.appendChild(img);

      const info = document.createElement('div');
      info.className = 'dog-info';

      const label = document.createElement('span');
      label.className = 'feature-label';
      label.textContent = featureLabelText;
      info.appendChild(label);

      const name = document.createElement('div');
      name.className = 'dog-name';
      name.textContent = dog.name || '';
      info.appendChild(name);

      const timer = document.createElement('div');
      timer.className = 'timer';
      timer.setAttribute('data-time', dog[timeField]);
      info.appendChild(timer);

      const serviceRow = document.createElement('div');
      serviceRow.className = 'dog-service-row';
      const type = document.createElement('span');
      type.className = 'service-type';
      type.textContent = formatServiceType(dog.serviceItemType, dog.serviceName);
      serviceRow.appendChild(type);
      info.appendChild(serviceRow);

      card.appendChild(photoWrap);
      card.appendChild(info);
      return card;
    }

    function renderPanel(containerId, dogs, timeField, featureLabelText, stateKey) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const ids = dogs.map(function(d){ return d.appointmentId || d.name || ''; }).join(',');
      if (ids === renderState[stateKey]) { updateTimers(); return; }
      renderState[stateKey] = ids;
      container.innerHTML = '';
      if (dogs.length === 0) {
        container.innerHTML = '<div class="empty-state"><span class="empty-check">&#10003;</span></div>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'dogs-grid';
      const cols = dogs.length === 1 ? 1 : dogs.length <= 4 ? 2 : dogs.length <= 9 ? 3 : 4;
      grid.style.setProperty('--cols', cols);
      dogs.forEach(function(dog, i) {
        const card = createDogCard(dog, timeField, featureLabelText);
        card.style.setProperty('--i', i);
        card.classList.add('animate-in');
        grid.appendChild(card);
      });
      container.appendChild(grid);
      updateTimers();
    }

    async function loadAll() {
      const results = await Promise.all([fetchList('dogs'), fetchList('checkins')]);
      const checkoutsRaw = results[0], checkinsRaw = results[1];
      const checkouts = filterRecent(checkoutsRaw, 'checkOutTime');
      const checkins  = filterRecent(checkinsRaw,  'checkInTime');

      const latestCheckout = checkouts[0] ? (checkouts[0].appointmentId || checkouts[0].name) : null;
      const latestCheckin  = checkins[0]  ? (checkins[0].appointmentId  || checkins[0].name)  : null;
      if (latestCheckout && lastCheckoutId !== null && latestCheckout !== lastCheckoutId) { playDing(); renderState.checkouts = ''; }
      if (latestCheckin  && lastCheckinId  !== null && latestCheckin  !== lastCheckinId)  { playDing(); renderState.checkins  = ''; }
      lastCheckoutId = latestCheckout;
      lastCheckinId  = latestCheckin;

      const ci = checkins.length, co = checkouts.length;
      let wCi, wCo;
      if (ci === 0 && co === 0) { wCi = 1; wCo = 1; }
      else if (ci === 0)        { wCi = 0.15; wCo = Math.max(1, co); }
      else if (co === 0)        { wCi = Math.max(1, ci); wCo = 0.15; }
      else                      { wCi = Math.max(1, ci); wCo = Math.max(1, co); }
      document.getElementById('panel-checkin').style.setProperty('--weight', wCi);
      document.getElementById('panel-checkout').style.setProperty('--weight', wCo);

      renderPanel('checkin-content',  checkins,  'checkInTime',  'Checking In',  'checkins');
      renderPanel('checkout-content', checkouts, 'checkOutTime', 'Checking Out', 'checkouts');
    }

    function playDing() {
      try { document.getElementById('ding-sound').play().catch(function(){}); } catch(e) {}
    }

    function updateClock() {
      const now = new Date();
      const t = document.getElementById('dt-time');
      const d = document.getElementById('dt-date');
      if (t) t.textContent = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      if (d) d.textContent = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    }

    function demoList(endpoint) {
      const now = Date.now();
      const min = function(n){ return new Date(now - n*60000).toISOString(); };
      const ph = function(id){ return 'https://placedog.net/640/640?id='+id; };
      if (endpoint === 'checkins') return [
        {appointmentId:'ci1',name:'Cheddar', imageUrl:ph(1),serviceName:'Boarding',    serviceItemType:'BOARDING',   checkInTime:min(1)},
        {appointmentId:'ci2',name:'Biscuit', imageUrl:ph(2),serviceName:'Daycare',     serviceItemType:'DAYCARE',    checkInTime:min(3)},
        {appointmentId:'ci3',name:'Mango',   imageUrl:ph(3),serviceName:'TT: Phase 1', serviceItemType:'EVALUATION', checkInTime:min(5)},
        {appointmentId:'ci4',name:'Pepper',  imageUrl:ph(4),serviceName:'Daycare',     serviceItemType:'DAYCARE',    checkInTime:min(7)},
        {appointmentId:'ci5',name:'Juno',    imageUrl:ph(5),serviceName:'TT: Phase 2', serviceItemType:'EVALUATION', checkInTime:min(9)}
      ];
      if (endpoint === 'dogs') return [
        {appointmentId:'co1',name:'Maverick',imageUrl:ph(6),serviceName:'Daycare',     serviceItemType:'DAYCARE',    checkOutTime:min(1)},
        {appointmentId:'co2',name:'Luna',    imageUrl:ph(7),serviceName:'Boarding',    serviceItemType:'BOARDING',   checkOutTime:min(4)},
        {appointmentId:'co3',name:'Scout',   imageUrl:ph(8),serviceName:'TT: Phase 1', serviceItemType:'EVALUATION', checkOutTime:min(6)},
        {appointmentId:'co4',name:'Olive',   imageUrl:ph(9),serviceName:'TT: Phase 2', serviceItemType:'EVALUATION', checkOutTime:min(8)}
      ];
      return [];
    }

    async function initDashboard() {
      try {
        if (DEMO_MODE) {
          currentLocation = 'demo';
          document.title = 'Down Dog Lodge  Demo';
        } else {
          const res = await fetch(API_BASE_URL + '/locations');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const locs = data.locations || {};
          const slugs = Object.keys(locs);
          if (!slugs.length) throw new Error('No locations');
          currentLocation = slugs[0];
          document.title = (data.businessName || 'Down Dog Lodge') + '  Live Board';
        }
        updateClock();
        setInterval(updateClock, 1000);
        await loadAll();
        setInterval(loadAll, POLL_INTERVAL_MS);
        setInterval(updateTimers, TIMER_INTERVAL_MS);
      } catch(err) {
        console.error('init:', err);
        document.getElementById('checkin-content').innerHTML = '<div class="empty-state"><span class="empty-check">&#10003;</span></div>';
        document.getElementById('checkout-content').innerHTML = '<div class="empty-state"><span class="empty-check">&#10003;</span></div>';
      }
    }

    initDashboard();
    document.addEventListener('click', function(){ document.getElementById('ding-sound').load(); }, {once:true});

    (function(){
      let vis = false, el = null;
      document.addEventListener('keydown', function(e){
        if (!e.ctrlKey || !e.shiftKey || e.key !== 'D') return;
        e.preventDefault(); vis = !vis;
        if (!vis) { if (el) el.style.display='none'; return; }
        if (!el) {
          el = document.createElement('div');
          el.style.cssText='position:fixed;top:10px;right:10px;z-index:9999;background:rgba(0,0,0,0.92);color:#0f0;font:11px monospace;padding:12px;border:1px solid #0f0;border-radius:6px;max-width:500px;max-height:80vh;overflow-y:auto;white-space:pre-wrap;';
          document.body.appendChild(el);
        }
        const r = window._lastApiResponse || {};
        let txt = '=== DEBUG ===\nloc: ' + currentLocation + '\n\n';
        for (const [ep,d] of Object.entries(r)) {
          txt += ep + ' (' + d.normalized.length + ' items) @ ' + d.ts + '\n';
          if (d.normalized[0]) txt += 'keys: ' + Object.keys(d.normalized[0]).join(', ') + '\n';
          txt += '\n';
    }
        el.textContent = txt; el.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
