<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0908">
  <title>Down Dog Lodge — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0908;
      --surface: #13110e;
      --surface-raised: #1a1814;
      --surface-hover: #211e19;
      --border: #23201a;
      --border-light: #302b23;
      --text: #ede8df;
      --text-secondary: #9e968a;
      --text-muted: #5e584e;
      --accent: #ede8df;
      --accent-glow: rgba(237, 232, 223, 0.35);
      --checkin-color: #ede8df;
      --checkin-glow: rgba(237, 232, 223, 0.35);
      --ddl-blue: #1e3a6b;
      --timer-color: #4a6fa5;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 25% 55%, rgba(237, 232, 223, 0.02) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Header ─── */
    .header {
      position: relative;
      padding: 1.1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      z-index: 10;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 2rem;
      right: 2rem;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        var(--border) 15%,
        var(--border-light) 40%,
        rgba(237, 232, 223, 0.25) 50%,
        var(--border-light) 60%,
        var(--border) 85%,
        transparent
      );
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .brand-logo {
      height: 3.2rem;
      width: auto;
      opacity: 1;
    }

    .brand-divider {
      width: 1px;
      height: 1.5rem;
      background: var(--border-light);
    }

    .brand .subtitle {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      padding-top: 0.1rem;
    }

    /* ─── Header clock ─── */
    .datetime {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.15rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .datetime .dt-time {
      font-family: var(--font-display);
      font-size: 1.9rem;
      color: var(--text);
    }

    .datetime .dt-date {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-secondary);
    }

    /* ─── Main Container (two panels) ─── */
    #main-container {
      flex: 1;
      display: flex;
      gap: 1rem;
      padding: 1rem 1.5rem 1.5rem;
      overflow: hidden;
      position: relative;
      z-index: 1;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      flex-grow: var(--weight, 1);
      flex-basis: 0;
      min-width: 340px;
      overflow: hidden;
      transition: flex-grow 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      border: 2px solid var(--text);
      border-radius: var(--radius-lg);
      padding: 0.9rem 1rem;
      background: rgba(255, 255, 255, 0.01);
    }

    .panel-header {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      padding: 0.2rem 0 0.8rem;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .panel-checkin .panel-header { color: var(--checkin-color); }
    .panel-checkout .panel-header { color: var(--accent); }

    .panel-content {
      flex: 1;
      display: flex;
      gap: 1rem;
      overflow: hidden;
      min-height: 0;
      justify-content: center;
      align-items: stretch;
    }

    /* ─── Dog Cards ─── */
    .dog-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0.25rem;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      overflow: hidden;
      min-width: 0;
    }

    .dog-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }

    .dog-photo {
      position: relative;
      overflow: hidden;
      border-radius: calc(var(--radius-lg) - 4px);
      flex: 1;
      min-height: 0;
      background: var(--surface-raised);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dog-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
      display: block;
      background: var(--surface-raised);
    }

    .dog-info {
      padding: 0.55rem 0.5rem 0.3rem;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .dog-name-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: 0.2rem 0.55rem;
    }

    .dog-service-row {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .service-type {
      display: inline-block;
      padding: 0.2rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--ddl-blue);
      background: var(--ddl-blue);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .panel-checkin .service-type,
    .panel-checkout .service-type {
      color: var(--text);
    }

    .feature-label {
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .panel-checkin .feature-label { color: var(--checkin-color); }
    .panel-checkout .feature-label { color: var(--accent); }

    .dog-name {
      font-family: var(--font-display);
      font-weight: 400;
      color: var(--text);
      line-height: 1;
      text-transform: uppercase;
      font-size: 1.75rem;
    }

    .owner-last {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: center;
      margin-top: -0.1rem;
    }

    .timer {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--timer-color);
    }

    .meta-dot {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .feature-label {
      display: block;
      width: 100%;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.15rem;
    }

    /* Featured card (largest, leftmost in each panel) */
    .dog-card.featured {
      flex: 0 0 42%;
    }

    /* Solo (only one dog in panel) */
    .dog-card.solo {
      flex: 1 1 100%;
      max-height: 100%;
    }

    /* ─── Dogs Grid (smaller cards beyond the featured) ─── */
    .dogs-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(var(--cols, 2), 1fr);
      grid-auto-rows: 1fr;
      gap: 1rem;
      min-width: 0;
      align-content: stretch;
    }

    /* ─── Highlight (recent activity glow) ─── */
    .panel-checkout .dog-card.highlight {
      border-color: var(--accent);
      animation: glow-pulse-checkout 2.5s ease-in-out infinite;
    }

    .panel-checkin .dog-card.highlight {
      border-color: var(--checkin-color);
      animation: glow-pulse-checkin 2.5s ease-in-out infinite;
    }

    @keyframes glow-pulse-checkout {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 24px 2px rgba(237, 232, 223, 0.14); }
    }

    @keyframes glow-pulse-checkin {
      0%, 100% { box-shadow: 0 0 0 0 var(--checkin-glow); }
      50% { box-shadow: 0 0 24px 2px rgba(237, 232, 223, 0.14); }
    }

    /* ─── Card entrance ─── */
    .animate-in {
      animation: card-enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: calc(var(--i, 0) * 0.07s);
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Empty & Loading ─── */
    .empty-state,
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 0.4rem;
      padding: 1.5rem;
      text-align: center;
    }

    .empty-check {
      display: inline-block;
      font-size: 2rem;
      line-height: 1;
      color: var(--text-muted);
      font-weight: 400;
    }

    .loading-state {
      font-size: 1.1rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      #main-container {
        flex-direction: column;
      }

      .panel-content {
        flex-direction: column;
      }

      .dog-card.featured {
        flex: 0 0 auto;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 0.65rem;
        padding: 0.9rem 1rem;
      }

      .header::after {
        left: 1rem;
        right: 1rem;
      }

      #main-container {
        padding: 0.75rem;
        gap: 0.75rem;
      }

      .dog-name {
        font-size: 1.3rem;
      }

      .dog-card {
        border-radius: var(--radius-lg);
      }

      .dog-photo {
        border-radius: calc(var(--radius-lg) - 4px);
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="brand">
      <img class="brand-logo" src="https://moegonew.s3-us-west-2.amazonaws.com/Public/Uploads/1773773054ea0084a5d186418a95d10c98a1451933.webp" alt="Down Dog Lodge">
      <span class="brand-divider"></span>
      <span class="subtitle">Live</span>
    </div>
    <div class="datetime" id="datetime">
      <span class="dt-time" id="dt-time">--:--</span>
      <span class="dt-date" id="dt-date">—</span>
    </div>
  </header>

  <main id="main-container">
    <section class="panel panel-checkin" id="panel-checkin">
      <h2 class="panel-header">Checking In</h2>
      <div class="panel-content" id="checkin-content">
        <div class="loading-state"><span class="empty-check">✓</span></div>
      </div>
    </section>

    <section class="panel panel-checkout" id="panel-checkout">
      <h2 class="panel-header">Checking Out</h2>
      <div class="panel-content" id="checkout-content">
        <div class="loading-state"><span class="empty-check">✓</span></div>
      </div>
    </section>
  </main>

  <audio id="ding-sound" preload="auto">
    <source src="ding.mp3" type="audio/mpeg">
  </audio>

  <script>
    const API_BASE_URL = window.location.origin;
    const VISIBLE_WINDOW_MS = 10 * 60 * 1000; // 10 minutes
    const HIGHLIGHT_WINDOW_S = 60;             // 1 min glow
    const POLL_INTERVAL_MS = 5000;
    const TIMER_INTERVAL_MS = 5000;

    // Demo mode: visit /dashboard.html?demo=1 to see the dashboard with sample dogs
    const DEMO_MODE = new URLSearchParams(window.location.search).has('demo');

    let currentLocation = null;
    let lastCheckoutId = null;
    let lastCheckinId = null;
    let lastRenderedCheckout = '';
    let lastRenderedCheckin = '';

    // ─── Data Loading ───
    async function fetchList(endpoint) {
      if (DEMO_MODE) return demoList(endpoint);
      try {
        const res = await fetch(`${API_BASE_URL}/${endpoint}?location=${currentLocation}&_=${Date.now()}`);
        if (!res.ok) return [];
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      } catch (err) {
        console.error(`Failed to load ${endpoint}:`, err);
        return [];
      }
    }

    // ─── Demo data ───
    function demoList(endpoint) {
      const now = Date.now();
      const min = (n) => new Date(now - n * 60000).toISOString();
      const photo = (id) => `https://placedog.net/640/640?id=${id}`;

      if (endpoint === 'checkins') {
        return [
          { appointmentId: 'demo-in-1', name: 'Cheddar',  ownerLastName: 'Siegelman', imageUrl: photo(1),  serviceItemType: 'BOARDING',  checkInTime: min(1) },
          { appointmentId: 'demo-in-2', name: 'Biscuit',  ownerLastName: 'Harper',    imageUrl: photo(2),  serviceItemType: 'DAYCARE',   checkInTime: min(3) },
          { appointmentId: 'demo-in-3', name: 'Mango',    ownerLastName: 'Nguyen',    imageUrl: photo(3),  serviceItemType: 'EVALUATION',checkInTime: min(5) },
          { appointmentId: 'demo-in-4', name: 'Pepper',   ownerLastName: 'Kim',       imageUrl: photo(4),  serviceItemType: 'DAYCARE',   checkInTime: min(7) },
          { appointmentId: 'demo-in-5', name: 'Juno',     ownerLastName: 'Alvarez',   imageUrl: photo(5),  serviceItemType: 'BOARDING',  checkInTime: min(9) }
        ];
      }
      if (endpoint === 'dogs') {
        return [
          { appointmentId: 'demo-out-1', name: 'Maverick', ownerLastName: 'Patel',   imageUrl: photo(6),  serviceItemType: 'DAYCARE',  checkOutTime: min(1) },
          { appointmentId: 'demo-out-2', name: 'Luna',     ownerLastName: 'Johnson', imageUrl: photo(7),  serviceItemType: 'BOARDING', checkOutTime: min(4) },
          { appointmentId: 'demo-out-3', name: 'Scout',    ownerLastName: 'Brooks',  imageUrl: photo(8),  serviceItemType: 'DAYCARE',  checkOutTime: min(6) },
          { appointmentId: 'demo-out-4', name: 'Olive',    ownerLastName: 'Chen',    imageUrl: photo(9),  serviceItemType: 'GROOMING', checkOutTime: min(8) }
        ];
      }
      return [];
    }

    function filterRecent(dogs, timeField) {
      const now = Date.now();
      return dogs.filter(d => {
        const ts = d[timeField];
        if (!ts) return false;
        return (now - new Date(ts).getTime()) < VISIBLE_WINDOW_MS;
      });
    }

    async function loadAll() {
      const [checkoutsRaw, checkinsRaw] = await Promise.all([
        fetchList('dogs'),
        fetchList('checkins')
      ]);

      checkoutsRaw.forEach(d => { if (!d.serviceItemType) d.serviceItemType = 'EVALUATION'; });
      checkinsRaw.forEach(d => { if (!d.serviceItemType) d.serviceItemType = 'EVALUATION'; });

      const checkouts = filterRecent(checkoutsRaw, 'checkOutTime');
      const checkins  = filterRecent(checkinsRaw, 'checkInTime');

      // Ding when a brand-new dog appears in either panel
      const latestCheckout = checkouts[0]?.appointmentId || null;
      const latestCheckin  = checkins[0]?.appointmentId || null;

      if (latestCheckout && lastCheckoutId !== null && latestCheckout !== lastCheckoutId) {
        playDing();
        lastRenderedCheckout = '';
      }
      if (latestCheckin && lastCheckinId !== null && latestCheckin !== lastCheckinId) {
        playDing();
        lastRenderedCheckin = '';
      }
      lastCheckoutId = latestCheckout;
      lastCheckinId  = latestCheckin;

      // Resize panels based on count + time-of-day bias.
      //   6am - 2pm → Checking In is the prominent side
      //   3pm - 10pm → Checking Out is the prominent side
      const hour = new Date().getHours();
      const checkinPrime  = hour >= 6  && hour < 14;
      const checkoutPrime = hour >= 15 && hour < 22;

      let wCheckin  = checkins.length  > 0 ? checkins.length  : 0.18;
      let wCheckout = checkouts.length > 0 ? checkouts.length : 0.18;
      if (checkinPrime)  wCheckin  += 3;
      if (checkoutPrime) wCheckout += 3;

      document.getElementById('panel-checkin').style.setProperty('--weight', wCheckin);
      document.getElementById('panel-checkout').style.setProperty('--weight', wCheckout);

      renderPanel('checkin-content', checkins, 'checkInTime', 'Checking In', 'lastRenderedCheckin');
      renderPanel('checkout-content', checkouts, 'checkOutTime', 'Checking Out', 'lastRenderedCheckout');
    }

    // ─── Card Creation ───
    function createDogCard(dog, isFeatured, timeField, featureLabelText) {
      const card = document.createElement('article');
      card.className = 'dog-card';
      if (isFeatured) card.classList.add('featured');

      const t = new Date(dog[timeField]);
      if ((Date.now() - t.getTime()) / 1000 <= HIGHLIGHT_WINDOW_S) {
        card.classList.add('highlight');
      }

      const photoWrap = document.createElement('div');
      photoWrap.className = 'dog-photo';

      const img = document.createElement('img');
      img.src = dog.imageUrl || 'placeholder.jpg';
      img.alt = dog.name;
      img.decoding = 'async';
      img.onerror = () => { img.src = 'placeholder.jpg'; };
      photoWrap.appendChild(img);

      const info = document.createElement('div');
      info.className = 'dog-info';

      const label = document.createElement('span');
      label.className = 'feature-label';
      label.textContent = featureLabelText;
      info.appendChild(label);

      const nameRow = document.createElement('div');
      nameRow.className = 'dog-name-row';

      const name = document.createElement('span');
      name.className = 'dog-name';
      name.textContent = dog.name;

      const dot1 = document.createElement('span');
      dot1.className = 'meta-dot';
      dot1.textContent = '\u00b7';

      const timer = document.createElement('span');
      timer.className = 'timer';
      timer.setAttribute('data-time', dog[timeField]);

      nameRow.appendChild(name);
      nameRow.appendChild(dot1);
      nameRow.appendChild(timer);
      info.appendChild(nameRow);

      if (dog.ownerLastName) {
        const owner = document.createElement('div');
        owner.className = 'owner-last';
        owner.textContent = dog.ownerLastName;
        info.appendChild(owner);
      }

      const serviceRow = document.createElement('div');
      serviceRow.className = 'dog-service-row';
      const type = document.createElement('span');
      type.className = 'service-type';
      type.textContent = formatServiceType(dog.serviceItemType);
      serviceRow.appendChild(type);
      info.appendChild(serviceRow);

      card.appendChild(photoWrap);
      card.appendChild(info);
      return card;
    }

    function formatServiceType(raw) {
      if (!raw) return 'Reservation';
      const s = String(raw).toLowerCase().replace(/_/g, ' ').trim();
      if (!s) return 'Reservation';
      // Map a few known MoeGo enums to friendlier labels
      const map = {
        'evaluation': 'Evaluation',
        'daycare': 'Daycare',
        'day care': 'Daycare',
        'boarding': 'Boarding',
        'overnight': 'Boarding',
        'grooming': 'Grooming',
        'bath': 'Bath',
        'training': 'Training'
      };
      if (map[s]) return map[s];
      return s.replace(/\b\w/g, c => c.toUpperCase());
    }

    // ─── Rendering ───
    const renderState = { lastRenderedCheckin: '', lastRenderedCheckout: '' };

    function renderPanel(containerId, dogs, timeField, featureLabelText, stateKey) {
      const container = document.getElementById(containerId);
      const ids = dogs.map(d => d.appointmentId).join(',');

      if (ids === renderState[stateKey]) {
        updateTimers();
        return;
      }
      renderState[stateKey] = ids;
      container.innerHTML = '';

      if (dogs.length === 0) {
        container.innerHTML =
          `<div class="empty-state"><span class="empty-check">✓</span></div>`;
        return;
      }

      const featured = createDogCard(dogs[0], true, timeField, featureLabelText);
      featured.style.setProperty('--i', 0);
      featured.classList.add('animate-in');

      if (dogs.length === 1) featured.classList.add('solo');
      container.appendChild(featured);

      if (dogs.length > 1) {
        const grid = document.createElement('div');
        grid.className = 'dogs-grid';
        const extras = dogs.slice(1);
        // Dog images shrink as more dogs appear: cols = ceil(sqrt(N)), capped at 4
        const cols = Math.min(4, Math.max(1, Math.ceil(Math.sqrt(extras.length))));
        grid.style.setProperty('--cols', cols);
        extras.forEach((dog, i) => {
          const card = createDogCard(dog, false, timeField, featureLabelText);
          card.style.setProperty('--i', i + 1);
          card.classList.add('animate-in');
          grid.appendChild(card);
        });
        container.appendChild(grid);
      }

      updateTimers();
    }

    // ─── Timer Updates ───
    function updateTimers() {
      const now = Date.now();
      let staleFound = false;
      document.querySelectorAll('.timer').forEach(timer => {
        const t = new Date(timer.getAttribute('data-time')).getTime();
        const diffMs = now - t;
        const diffMin = Math.floor(diffMs / 60000);

        if (diffMs >= VISIBLE_WINDOW_MS) {
          // Safety net: if a card ever exceeds the 10-min window, force a prune.
          staleFound = true;
          const card = timer.closest('.dog-card');
          if (card) card.remove();
          return;
        }

        if (diffMin <= 0) timer.textContent = 'Just now';
        else if (diffMin === 1) timer.textContent = '1 min ago';
        else timer.textContent = diffMin + ' min ago';

        const card = timer.closest('.dog-card');
        if (card) {
          if (diffMs / 1000 <= HIGHLIGHT_WINDOW_S) card.classList.add('highlight');
          else card.classList.remove('highlight');
        }
      });
      if (staleFound) {
        // Reset render state so the next poll fully rebuilds (fills empty states, etc.)
        renderState.lastRenderedCheckin = '';
        renderState.lastRenderedCheckout = '';
        loadAll();
      }
    }

    function playDing() {
      try { document.getElementById('ding-sound').play().catch(() => {}); } catch {}
    }

    // ─── Header clock ───
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
      const dateStr = now.toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
      const tEl = document.getElementById('dt-time');
      const dEl = document.getElementById('dt-date');
      if (tEl) tEl.textContent = timeStr;
      if (dEl) dEl.textContent = dateStr;
    }

    // ─── Periodic prune (drops anything that crossed the 10-min line without a server poke) ───
    function periodicPrune() {
      // The render keys are reset so the next loadAll will rebuild based on
      // the freshly-filtered list. We also force a re-render now so cards
      // disappear immediately at the 10-minute mark.
      lastRenderedCheckin = '';
      lastRenderedCheckout = '';
      renderState.lastRenderedCheckin = '';
      renderState.lastRenderedCheckout = '';
      loadAll();
    }

    // ─── Init ───
    async function initDashboard() {
      try {
        if (DEMO_MODE) {
          currentLocation = 'demo';
          document.title = 'Down Dog Lodge \u2014 Demo';
        } else {
          const res = await fetch(API_BASE_URL + '/locations');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          const businessName = data.businessName || 'Pet Facility';
          const locations = data.locations || {};
          const slugs = Object.keys(locations);
          if (slugs.length === 0) throw new Error('No locations configured');

          currentLocation = slugs[0];
          document.title = businessName + ' \u2014 Live Board';
        }

        updateClock();
        setInterval(updateClock, 1000);

        loadAll();
        setInterval(updateTimers, TIMER_INTERVAL_MS);
        setInterval(loadAll, POLL_INTERVAL_MS);
        // Re-evaluate the 10-minute window every 30s so stale cards leave on time
        setInterval(periodicPrune, 30 * 1000);
      } catch (err) {
        console.error('init error:', err);
        document.getElementById('checkin-content').innerHTML =
          '<div class="empty-state"><span class="empty-check">✓</span></div>';
        document.getElementById('checkout-content').innerHTML =
          '<div class="empty-state"><span class="empty-check">✓</span></div>';
      }
    }

    initDashboard();

    document.addEventListener('click', () => {
      document.getElementById('ding-sound').load();
    }, { once: true });
  </script>
</body>
</html>
